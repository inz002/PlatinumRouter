<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost of Tsushima Overlay</title>
  <link rel="stylesheet" href="./overlay.css" />
</head>
<body>
  <div class="overlayShell">
    <div class="overlayBar" id="overlayBar">
      <div class="timerChip" id="timer">00:00:00</div>

      <div class="metaChip progressChip" id="progressChip">0%</div>

      <div class="chipsWrap" id="items">
        <div class="empty">Waiting for controller state…</div>
      </div>

      <div class="metaChip" id="dirgeChip" hidden>🎵 Dirge</div>
      <div class="metaChip" id="meta">Lethal</div>
    </div>

    <div class="debugDock">
      <div class="debugRow">
        <button id="debugToggle" class="debugBtn">🐞 Show Debug</button>
        <button id="debugClear" class="debugBtn">Clear Logs</button>
        <button id="debugCopy" class="debugBtn">Copy Snapshot</button>
      </div>

      <div id="debugPanel" class="debugPanel">
        <div class="debugSection">
          <div class="eyebrow">Status</div>
          <div id="debugStatus"></div>
        </div>

        <div class="debugSection">
          <div class="eyebrow">Logs</div>
          <div id="debugBody" class="debugBody"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createDebugger } from "./js/debug.js";

    const STORAGE_KEY = "platinumrouter_state_v1";
    const debug = createDebugger({ name: "overlay" });

    let cache = null;

    function formatMs(ms) {
      const totalSeconds = Math.max(0, Math.floor((ms || 0) / 1000));
      const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
      const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${hours}:${minutes}:${seconds}`;
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function normalizeSplit(split) {
      return {
        id: "",
        label: "",
        note: "",
        phaseId: "",
        isPhaseStart: false,
        auto: {},
        ...split
      };
    }

    function getActivePhaseId(splits, currentSplitIndex, phases) {
      let active = "legacy_all";

      for (let i = 0; i <= currentSplitIndex && i < splits.length; i += 1) {
        const split = normalizeSplit(splits[i]);
        if (split.isPhaseStart && split.phaseId && phases[split.phaseId]) {
          active = split.phaseId;
        }
      }

      return active;
    }

    function normalizePath(path) {
      if (!path) return "./data/ghost-of-tsushima";
      if (path.startsWith("./")) return path;
      if (path.startsWith("/")) return `.${path}`;
      return `./${path}`;
    }

    async function fetchJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) throw new Error(`Failed to load ${path}`);
      return response.json();
    }

    async function loadGameData(gameId = "ghost-of-tsushima") {
      const registry = await fetchJson("./data/games.json");
      const game = (registry.games || []).find((entry) => entry.id === gameId) || registry.games?.[0];

      if (!game) throw new Error("No game config found");

      const basePath = normalizePath(game.path);

      const [meta, counters, phases] = await Promise.all([
        fetchJson(`${basePath}/meta.json`),
        fetchJson(`${basePath}/counters.json`),
        fetchJson(`${basePath}/phases.json`)
      ]);

      return { game, meta, counters, phases };
    }

    function buildNormalizedCounters(counterDefs, savedCounters) {
      const result = {};
      const source = savedCounters && typeof savedCounters === "object" ? savedCounters : {};

      Object.entries(counterDefs || {}).forEach(([key, def]) => {
        const saved = source[key] || {};
        result[key] = {
          ...def,
          value: Number.isFinite(Number(saved.value)) ? Number(saved.value) : 0,
          manualDelta: Number.isFinite(Number(saved.manualDelta)) ? Number(saved.manualDelta) : 0
        };
      });

      return result;
    }

    function chipHtml(icon, text, extraClass = "") {
      return `<div class="counterChip ${extraClass}"><span class="chipIcon">${icon || "•"}</span><span class="chipText">${text}</span></div>`;
    }

    function computeOverallPercent(counterDefs, counters) {
      let total = 0;
      let done = 0;

      Object.keys(counterDefs || {}).forEach((key) => {
        const def = counterDefs[key];
        const counter = counters[key];
        if (!def || !counter) return;

        const max = Number(def.max || 0);
        const value = Number(counter.value || 0);

        total += max;
        done += Math.min(value, max);
      });

      if (total <= 0) return 0;
      return Math.floor((done / total) * 100);
    }

    async function render() {
      const state = loadState();
      const gameId = state.gameId || "ghost-of-tsushima";

      if (!cache || cache.game.id !== gameId) {
        cache = await loadGameData(gameId);
      }

      const { counters: counterDefs, phases, meta } = cache;
      const counters = buildNormalizedCounters(counterDefs, state.counters);
      const splits = Array.isArray(state.splits) ? state.splits : [];
      const currentSplitIndex = Number.isFinite(state.currentSplitIndex) ? state.currentSplitIndex : 0;

      const activePhaseId = getActivePhaseId(splits, currentSplitIndex, phases);
      const activePhase = phases[activePhaseId] || phases.legacy_all || { visible: [] };

      const timerEl = document.getElementById("timer");
      const metaEl = document.getElementById("meta");
      const itemsEl = document.getElementById("items");
      const dirgeChipEl = document.getElementById("dirgeChip");
      const progressChipEl = document.getElementById("progressChip");

      timerEl.textContent = formatMs(state.elapsedMs || 0);
      timerEl.classList.toggle("running", !!state.running);
      metaEl.textContent = state.settings?.difficulty || meta?.defaultDifficulty || "Lethal";
      dirgeChipEl.hidden = !state.miscChecks?.dirge;

      const overallPercent = computeOverallPercent(counterDefs, counters);
      progressChipEl.textContent = `${overallPercent}%`;

      const visibleKeys = Array.isArray(activePhase.visible) ? activePhase.visible : [];
      const orderedKeys = [
        ...visibleKeys,
        ...Object.keys(counterDefs).filter((key) => !visibleKeys.includes(key))
      ];

      itemsEl.innerHTML = "";

      const fragments = [];

      orderedKeys.forEach((key) => {
        if (key === "dirge") return;

        const def = counterDefs[key];
        const counter = counters[key];
        if (!def || !counter) return;

        const value = Number(counter.value || 0);
        const max = Number(def.max || 0);

        fragments.push(
          chipHtml(
            def.icon,
            `${value}/${max}`,
            visibleKeys.includes(key) ? "activePhaseChip" : ""
          )
        );
      });

      if (!fragments.length) {
        itemsEl.innerHTML = `<div class="empty">No counters loaded</div>`;
      } else {
        itemsEl.innerHTML = fragments.join("");
      }

      debug.setStatus("gameId", gameId);
      debug.setStatus("activePhase", activePhaseId);
      debug.setStatus("visibleObjectives", visibleKeys.length);
      debug.setStatus("splitCount", splits.length);
      debug.setStatus("counterCount", Object.keys(counters).length);
      debug.setStatus("difficulty", state.settings?.difficulty || "Lethal");
      debug.setStatus("elapsedMs", state.elapsedMs || 0);
      debug.setStatus("overallPercent", `${overallPercent}%`);
    }

    debug.setSnapshotBuilder(() => ({
      cache,
      saved: loadState()
    }));

    window.addEventListener("storage", (event) => {
      if (event.key === STORAGE_KEY) {
        render().catch((error) => {
          debug.error("Overlay render failed on storage event", {
            message: error.message,
            stack: error.stack
          });
          console.error(error);
        });
      }
    });

    setInterval(() => {
      render().catch((error) => {
        debug.error("Overlay render failed on interval", {
          message: error.message,
          stack: error.stack
        });
        console.error(error);
      });
    }, 500);

    render().catch((error) => {
      debug.error("Overlay initial render failed", {
        message: error.message,
        stack: error.stack
      });
      console.error(error);
    });
  </script>
</body>
</html>
