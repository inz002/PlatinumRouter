<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost of Tsushima Plain Overlay</title>
  <style>
    :root {
      --bg: rgba(0, 0, 0, 0.88);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: rgba(255, 255, 255, 0.64);
      --pill: rgba(255, 255, 255, 0.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
    }
    .overlay {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      max-height: 48px;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: fit-content;
      max-width: 100vw;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }
    .timer {
      flex: 0 0 auto;
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }
    .divider {
      width: 1px;
      align-self: stretch;
      background: var(--border);
      flex: 0 0 auto;
    }
    .items {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .items::-webkit-scrollbar { display: none; }
    .item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--border);
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .icon {
      font-size: 18px;
      line-height: 1;
    }
    .count {
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
    }
    .meta {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      height: 34px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="timer" id="timer">00:00:00</div>
    <div class="divider"></div>
    <div class="items" id="items">
      <div class="empty">Waiting for controller state…</div>
    </div>
    <div class="divider"></div>
    <div class="meta" id="meta">Lethal</div>
  </div>
