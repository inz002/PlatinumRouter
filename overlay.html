<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost of Tsushima Plain Overlay</title>
  <style>
    :root {
      --bg: rgba(0, 0, 0, 0.88);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: rgba(255, 255, 255, 0.64);
      --pill: rgba(255, 255, 255, 0.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
    }
    .overlay {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      max-height: 48px;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: fit-content;
      max-width: 100vw;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }
    .timer {
      flex: 0 0 auto;
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }
    .divider {
      width: 1px;
      align-self: stretch;
      background: var(--border);
      flex: 0 0 auto;
    }
    .items {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .items::-webkit-scrollbar { display: none; }
    .item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--border);
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .icon {
      font-size: 18px;
      line-height: 1;
    }
    .count {
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
    }
    .meta {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      height: 34px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="timer" id="timer">00:00:00</div>
    <div class="divider"></div>
    <div class="items" id="items">
      <div class="empty">Waiting for controller state…</div>
    </div>
    <div class="divider"></div>
    <div class="meta" id="meta">Lethal</div>
  </div>

  <script>
    const STORAGE_KEY = 'got_platinum_overlay_html_v6';
    const CHANNEL_NAME = 'got_platinum_overlay_channel_v1';

    const COUNTER_DEFS = {
      trophies: { icon: '🏆', max: 52 },
      inari: { icon: '🦊', max: 49 },
      hotsprings: { icon: '🍑', max: 18 },
      bamboo: { icon: '🎍', max: 16 },
      haiku: { icon: '🎼', max: 19 },
      records: { icon: '📜', max: 20 },
      artifacts: { icon: '🛡️', max: 20 },
      shrines: { icon: '⛩️', max: 16 },
      crickets: { icon: '🦗', max: 5 },
      hiddenaltars: { icon: '🙏', max: 10 },
      duels: { icon: '⚔️', max: 25 },
      territories: { icon: '🏕️', max: 56 },
      mythictales: { icon: '📘', max: 7 },
      sidetales: { icon: '📝', max: 61 },
      monochrome: { icon: '🎨', max: 2 },
      cooper: { icon: '🦝', max: 3 }
    };

    const PHASES = {
      legacy_all: { visible: ['trophies','inari','hotsprings','bamboo','haiku','shrines','records','artifacts','crickets','hiddenaltars','monochrome','dirge','cooper','sidetales','duels','territories','mythictales'] },
      any_act1: { visible: ['trophies','inari','hotsprings','bamboo','haiku','shrines','records','artifacts','crickets','hiddenaltars','monochrome'] },
      any_act2: { visible: ['trophies','inari','hotsprings','bamboo','haiku','shrines','records','artifacts','crickets','hiddenaltars','monochrome','dirge'] },
      any_act3: { visible: ['trophies','inari','hotsprings','bamboo','haiku','shrines','records','artifacts','crickets','hiddenaltars','cooper'] },
      ngp_act1: { visible: ['trophies','sidetales','duels','territories','mythictales'] },
      ngp_act2: { visible: ['trophies','sidetales','duels','territories','mythictales'] },
      ngp_act3: { visible: ['trophies','sidetales','duels','territories','mythictales'] }
    };

    const channel = typeof BroadcastChannel !== 'undefined'
      ? new BroadcastChannel(CHANNEL_NAME)
      : null;

    let liveState = null;
    let lastSerializedState = '';

    function formatMs(ms) {
      const s = Math.max(0, Math.floor((ms || 0) / 1000));
      const h = String(Math.floor(s / 3600)).padStart(2, '0');
      const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const sec = String(s % 60).padStart(2, '0');
      return `${h}:${m}:${sec}`;
    }

    function normalizeSplit(split) {
      return { id: '', label: '', note: '', phaseId: '', isPhaseStart: false, auto: {}, ...split };
    }

    function readStoredState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || '';
        if (raw) {
          lastSerializedState = raw;
          return JSON.parse(raw);
        }
      } catch {
        // ignore malformed state and fall back
      }
      return {};
    }

    function getState() {
      return liveState || readStoredState();
    }

    function getActivePhaseId(splits, currentSplitIndex) {
      let active = 'legacy_all';
      for (let i = 0; i <= currentSplitIndex && i < splits.length; i += 1) {
        const split = normalizeSplit(splits[i]);
        if (split.isPhaseStart && split.phaseId && PHASES[split.phaseId]) active = split.phaseId;
      }
      return active;
    }

    function buildItems(state) {
      const items = [];
      const counters = state.counters || {};
      const splits = Array.isArray(state.splits) ? state.splits : [];
      const currentSplitIndex = Number.isFinite(state.currentSplitIndex) ? state.currentSplitIndex : 0;
      const activePhaseId = getActivePhaseId(splits, currentSplitIndex);
      const visible = (PHASES[activePhaseId] || PHASES.legacy_all).visible || [];

      visible.forEach((key) => {
        if (key === 'dirge') {
          if (!state.miscChecks?.dirge) items.push({ icon: '🎵', text: 'Dirge' });
          return;
        }
        const def = COUNTER_DEFS[key];
        const counter = counters[key];
        if (!def || !counter) return;
        const value = Number(counter.value || 0);
        if (value >= def.max) return;
        items.push({ icon: def.icon, text: `${value}/${def.max}` });
      });

      return items;
    }

    function renderFromState(state) {
      document.getElementById('timer').textContent = formatMs(state.elapsedMs || 0);
      document.getElementById('meta').textContent = state.settings?.difficulty || 'Lethal';

      const itemsEl = document.getElementById('items');
      const items = buildItems(state);
      itemsEl.innerHTML = '';

      if (!items.length) {
        itemsEl.innerHTML = '<div class="empty">All visible objectives complete</div>';
        return;
      }

      items.forEach((item) => {
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `<span class="icon">${item.icon}</span><span class="count">${item.text}</span>`;
        itemsEl.appendChild(el);
      });
    }

    function render() {
      renderFromState(getState());
    }

    function applyIncomingState(nextState) {
      if (!nextState || typeof nextState !== 'object') return;
      liveState = nextState;
      try {
        lastSerializedState = JSON.stringify(nextState);
        localStorage.setItem(STORAGE_KEY, lastSerializedState);
      } catch {
        // ignore localStorage write issues
      }
      renderFromState(nextState);
    }

    if (channel) {
      channel.onmessage = (event) => {
        const message = event.data;
        if (!message || typeof message !== 'object') return;

        if (message.type === 'state' && message.payload) {
          applyIncomingState(message.payload);
        }

        if (message.type === 'request_state') {
          const state = getState();
          channel.postMessage({ type: 'state', payload: state });
        }
      };
    }

    window.addEventListener('storage', (event) => {
      if (event.key !== STORAGE_KEY) return;
      liveState = readStoredState();
      render();
    });

    setInterval(() => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || '';
        if (raw !== lastSerializedState) {
          lastSerializedState = raw;
          liveState = raw ? JSON.parse(raw) : {};
          render();
        }
      } catch {
        // ignore parse failures during polling
      }
    }, 150);

    render();

    if (channel) {
      channel.postMessage({ type: 'request_state' });
    }
  </script>
</body>
</html>
