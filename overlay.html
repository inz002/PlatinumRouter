<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost of Tsushima Plain Overlay</title>
  <style>
    :root {
      --bg: rgba(12, 18, 30, 0.92);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: rgba(255, 255, 255, 0.64);
      --pill: rgba(255, 255, 255, 0.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 16px;
    }

    .overlay {
      width: 380px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    .timer {
      font-family: var(--mono);
      font-size: 50px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
    }

    .status-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--border);
      font-size: 13px;
      line-height: 1;
      white-space: nowrap;
    }

    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-wrap {
      margin-bottom: 14px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      transition: width 120ms linear;
    }

    .items {
      display: grid;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
    }

    .item-left {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .item-icon {
      width: 20px;
      text-align: center;
      flex: 0 0 20px;
    }

    .item-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-value {
      font-family: var(--mono);
      color: var(--muted);
      flex: 0 0 auto;
    }

    .empty {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div id="timer" class="timer">00:00:00</div>

    <div class="status-row">
      <div class="pill"><strong>Phase:</strong> <span id="phaseLabel">—</span></div>
      <div class="pill"><strong>Progress:</strong> <span id="progressText">0%</span></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>

    <div class="section-label">Visible objectives</div>
    <div id="items" class="items">
      <div class="empty">Waiting for controller state…</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "platinumrouter_state_v1";

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function formatMs(ms) {
      const totalSeconds = Math.max(0, Math.floor((Number(ms) || 0) / 1000));
      const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
      const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${hours}:${minutes}:${seconds}`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function computeProgressPercent(values, counters) {
      const trophyCurrent = Number(values.trophies || 0);
      const trophyMax = Number(counters.trophies?.max || 52);

      if (trophyMax > 0) {
        return clamp((trophyCurrent / trophyMax) * 100, 0, 100);
      }

      let current = 0;
      let max = 0;
      for (const [key, meta] of Object.entries(counters || {})) {
        const localMax = Number(meta?.max || 0);
        if (localMax <= 0) continue;
        current += Number(values[key] || 0);
        max += localMax;
      }

      if (!max) return 0;
      return clamp((current / max) * 100, 0, 100);
    }

    function createItem(key, meta, value) {
      const row = document.createElement("div");
      row.className = "item";

      const left = document.createElement("div");
      left.className = "item-left";

      const icon = document.createElement("div");
      icon.className = "item-icon";
      icon.textContent = meta.icon || "";

      const label = document.createElement("div");
      label.className = "item-label";
      label.textContent = meta.label || key;

      const right = document.createElement("div");
      right.className = "item-value";
      right.textContent = `${value}/${meta.max ?? 0}`;

      left.appendChild(icon);
      left.appendChild(label);
      row.appendChild(left);
      row.appendChild(right);
      return row;
    }

    function render() {
      const state = loadState();
      const timerEl = document.getElementById("timer");
      const phaseLabelEl = document.getElementById("phaseLabel");
      const progressTextEl = document.getElementById("progressText");
      const progressBarEl = document.getElementById("progressBar");
      const itemsEl = document.getElementById("items");

      const counters = state.counters || {};
      const counts = state.counts || {};
      const visibleKeys = Array.isArray(state.visibleCounters) ? state.visibleCounters : [];
      const phaseId = state.activePhaseId || "legacy_all";
      const phaseLabel = state.phases?.[phaseId]?.label || phaseId;

      timerEl.textContent = formatMs(state.elapsedMs || 0);
      phaseLabelEl.textContent = phaseLabel;

      const progress = Math.round(computeProgressPercent(counts, counters));
      progressTextEl.textContent = `${progress}%`;
      progressBarEl.style.width = `${progress}%`;

      itemsEl.innerHTML = "";

      if (!visibleKeys.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No visible objectives.";
        itemsEl.appendChild(empty);
        return;
      }

      for (const key of visibleKeys) {
        if (!counters[key]) continue;
        itemsEl.appendChild(createItem(key, counters[key], Number(counts[key] || 0)));
      }
    }

    render();
    setInterval(render, 250);
    window.addEventListener("storage", (event) => {
      if (event.key === STORAGE_KEY) render();
    });
  </script>
</body>
</html>
