<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost of Tsushima Overlay</title>

  <link rel="stylesheet" href="./overlay.css" />
</head>

<body>
  <div class="overlay" id="overlay">
    <div class="timer" id="timer">00:00:00</div>

    <div class="divider"></div>

    <div class="items" id="items">
      <div class="empty">Waiting for controller state…</div>
    </div>

    <div class="divider"></div>

    <div class="meta" id="meta">Lethal</div>
  </div>

  <script type="module">
    import { createDebugger } from "./js/debug.js";

    const STORAGE_KEY = "platinumrouter_state_v1";

    const debug = createDebugger({ name: "overlay" });

    function formatMs(ms) {
      const totalSeconds = Math.max(0, Math.floor((ms || 0) / 1000));
      const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
      const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${hours}:${minutes}:${seconds}`;
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function normalizeSplit(split) {
      return {
        phaseId: "",
        isPhaseStart: false,
        ...split
      };
    }

    function getActivePhaseId(splits, currentSplitIndex, phases) {
      let active = "legacy_all";

      for (let i = 0; i <= currentSplitIndex && i < splits.length; i++) {
        const split = normalizeSplit(splits[i]);
        if (split.isPhaseStart && split.phaseId && phases[split.phaseId]) {
          active = split.phaseId;
        }
      }

      return active;
    }

    async function loadGameData(gameId = "ghost-of-tsushima") {
      const registry = await fetch("./data/games.json").then(r => r.json());
      const game = registry.games.find(g => g.id === gameId);

      const base = game.path;

      const [meta, counters, phases] = await Promise.all([
        fetch(`${base}/meta.json`).then(r => r.json()),
        fetch(`${base}/counters.json`).then(r => r.json()),
        fetch(`${base}/phases.json`).then(r => r.json())
      ]);

      return { meta, counters, phases };
    }

    function buildCounters(defs, saved) {
      const result = {};

      Object.entries(defs || {}).forEach(([key, def]) => {
        result[key] = {
          ...def,
          value: Number(saved?.[key]?.value || 0)
        };
      });

      return result;
    }

    let cache = null;

    async function render() {
      const state = loadState();
      const gameId = state.gameId || "ghost-of-tsushima";

      if (!cache) {
        cache = await loadGameData(gameId);
      }

      const { counters: defs, phases, meta } = cache;

      const counters = buildCounters(defs, state.counters);
      const splits = state.splits || [];
      const index = state.currentSplitIndex || 0;

      const phaseId = getActivePhaseId(splits, index, phases);
      const phase = phases[phaseId] || { visible: [] };

      document.getElementById("timer").textContent = formatMs(state.elapsedMs);
      document.getElementById("meta").textContent =
        state.settings?.difficulty || meta.defaultDifficulty || "Lethal";

      const itemsEl = document.getElementById("items");
      itemsEl.innerHTML = "";

      const visible = phase.visible || [];

      const items = [];

      visible.forEach((key) => {
        if (key === "dirge") {
          if (!state.miscChecks?.dirge) {
            items.push({ icon: "🎵", text: "Dirge" });
          }
          return;
        }

        const def = defs[key];
        const counter = counters[key];

        if (!def || !counter) return;

        if (counter.value >= def.max) return;

        items.push({
          icon: def.icon,
          text: `${counter.value}/${def.max}`
        });
      });

      if (!items.length) {
        itemsEl.innerHTML = '<div class="empty">All objectives complete</div>';
        return;
      }

      items.forEach((item) => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `<span class="icon">${item.icon}</span><span class="count">${item.text}</span>`;
        itemsEl.appendChild(el);
      });
    }

    setInterval(render, 500);
    render();
  </script>
</body>
</html>
