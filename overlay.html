<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overlay</title>
  <link rel="stylesheet" href="./overlay.css" />
</head>
<body>
  <div class="overlayShell">

    <!-- MAIN BAR -->
    <div class="overlayBar">

      <!-- TIMER -->
      <div class="timerChip" id="timer">00:00:00</div>

      <!-- OVERALL % -->
      <div class="metaChip progressChip" id="progressChip">0%</div>

      <!-- CURRENT SPLIT (NEW - BIG STREAM VALUE) -->
      <div class="metaChip" id="currentSplit">Starting…</div>

      <!-- COUNTERS -->
      <div class="chipsWrap" id="items">
        <div class="empty">Waiting for controller…</div>
      </div>

      <!-- OPTIONAL FLAGS -->
      <div class="metaChip" id="dirgeChip" hidden>🎵 Dirge</div>
      <div class="metaChip" id="difficultyChip">Lethal</div>

    </div>

    <!-- DEBUG (hidden unless toggled) -->
    <div class="debugDock">
      <div class="debugRow">
        <button id="debugToggle" class="debugBtn">🐞 Debug</button>
        <button id="debugClear" class="debugBtn">Clear</button>
        <button id="debugCopy" class="debugBtn">Copy</button>
      </div>

      <div id="debugPanel" class="debugPanel">
        <div class="debugSection">
          <div class="eyebrow">Status</div>
          <div id="debugStatus"></div>
        </div>

        <div class="debugSection">
          <div class="eyebrow">Logs</div>
          <div id="debugBody" class="debugBody"></div>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    import { createDebugger } from "./js/debug.js";

    const STORAGE_KEY = "tsushima-router-state";
    const debug = createDebugger({ name: "overlay" });

    let cache = null;

    function formatMs(ms) {
      const total = Math.floor((ms || 0) / 1000);
      const h = String(Math.floor(total / 3600)).padStart(2, "0");
      const m = String(Math.floor((total % 3600) / 60)).padStart(2, "0");
      const s = String(total % 60).padStart(2, "0");
      return `${h}:${m}:${s}`;
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    async function fetchJson(path) {
      const res = await fetch(path, { cache: "no-store" });
      return res.json();
    }

    async function loadGameData(gameId = "ghost-of-tsushima") {
      const registry = await fetchJson("./data/games.json");
      const game = registry.games.find(g => g.id === gameId);

      const base = game.path;

      const [meta, counters, phases] = await Promise.all([
        fetchJson(`${base}/meta.json`),
        fetchJson(`${base}/counters.json`),
        fetchJson(`${base}/phases.json`)
      ]);

      return { meta, counters, phases };
    }

    function computePercent(defs, counters) {
      let total = 0;
      let done = 0;

      Object.keys(defs).forEach(key => {
        const max = Number(defs[key].max || 0);
        const val = Number(counters[key]?.value || 0);

        total += max;
        done += Math.min(val, max);
      });

      return total > 0 ? Math.floor((done / total) * 100) : 0;
    }

    function chip(icon, text, active = false) {
      return `
        <div class="counterChip ${active ? "activePhaseChip" : ""}">
          <span class="chipIcon">${icon || "•"}</span>
          <span class="chipText">${text}</span>
        </div>
      `;
    }

    async function render() {
      const state = loadState();
      const gameId = state.gameId || "ghost-of-tsushima";

      if (!cache) {
        cache = await loadGameData(gameId);
      }

      const { counters: defs, phases, meta } = cache;

      const counters = state.counters || {};
      const phase = phases[state.phase] || {};

      const visible = phase.visible || phase.visibleCounters || [];

      // TIMER
      const elapsed = state?.timer?.elapsed || 0;
      const running = !!state?.timer?.running;

      const timerEl = document.getElementById("timer");
      timerEl.textContent = formatMs(elapsed);
      timerEl.classList.toggle("running", running);

      // % PROGRESS
      const percent = computePercent(defs, counters);
      document.getElementById("progressChip").textContent = `${percent}%`;

      // CURRENT SPLIT
      const currentSplit =
        state?.splits?.items?.[state?.splits?.currentIndex];

      document.getElementById("currentSplit").textContent =
        currentSplit?.label || "Run Complete";

      // DIFFICULTY
      document.getElementById("difficultyChip").textContent =
        meta?.difficulty || "Lethal";

      // DIRGE
      document.getElementById("dirgeChip").hidden = !state?.misc?.dirgeDone;

      // COUNTERS (HIDE COMPLETED)
      const fragments = [];

      Object.keys(defs).forEach(key => {
        const def = defs[key];
        const val = Number(counters[key]?.value || 0);
        const max = Number(def.max || 0);

        if (max > 0 && val >= max) return;

        fragments.push(
          chip(def.icon, `${val}/${max}`, visible.includes(key))
        );
      });

      document.getElementById("items").innerHTML =
        fragments.length ? fragments.join("") : `<div class="empty">All done 🎉</div>`;

      // DEBUG
      debug.setStatus("phase", state.phase);
      debug.setStatus("split", currentSplit?.label);
      debug.setStatus("percent", percent);
    }

    // storage sync
    window.addEventListener("storage", (e) => {
      if (e.key === STORAGE_KEY) render();
    });

    // interval (for timer refresh)
    setInterval(render, 500);

    render();

    // debug controls
    const panel = document.getElementById("debugPanel");

    document.getElementById("debugToggle").onclick = () => {
      panel.classList.toggle("open");
    };

    document.getElementById("debugClear").onclick = () => {
      debug.clear();
    };

    document.getElementById("debugCopy").onclick = async () => {
      await navigator.clipboard.writeText(
        JSON.stringify(loadState(), null, 2)
      );
    };
  </script>
</body>
</html>
