<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Ghost of Tsushima Controller</title>
<link rel="stylesheet" href="./styles.css" />
</head>

<body>
<div class="app">

  <!-- HEADER -->
  <div class="top">
    <div>
      <div class="eyebrow">Run Control</div>
      <div id="runTitle" class="title">Ghost of Tsushima Platinum</div>
      <div class="subtitle">Phase-based routing controller</div>
    </div>
    <div id="difficultyBadge" class="badge lethal">Lethal</div>
  </div>

  <div class="layout">

    <!-- LEFT COLUMN -->
    <div class="stack">

      <!-- TIMER -->
      <div class="panel">
        <div class="timerBox">
          <div class="timerLabel">⏱️ Run Timer</div>
          <div id="timer" class="timer">00:00:00</div>

          <div class="row" style="justify-content:center;margin-top:12px">
            <button id="startPauseBtn" class="btn primary">▶ Start</button>
            <button id="undoBtn" class="btn">↶ Undo</button>
          </div>
        </div>
      </div>

      <!-- CURRENT SPLIT -->
      <div class="panel">
        <div class="card">
          <div class="eyebrow">Current Split</div>
          <div id="currentSplitLabel" class="mid" style="margin-top:6px">No split</div>

          <div class="row" style="margin-top:8px">
            <div id="historyCount" class="pill">0 splits</div>
            <div id="modePill" class="pill">Lethal</div>
          </div>

          <button id="advanceCurrentBtn" class="btn primary full" style="margin-top:12px">
            ▶ Complete Split
          </button>
        </div>
      </div>

      <!-- PROGRESS -->
      <div class="panel">
        <div class="compact">

          <div class="card">
            <div class="eyebrow">Overall</div>
            <div id="overallPercent" class="big">0%</div>
            <div class="bar">
              <span id="overallBar" style="width:0%"></span>
            </div>
          </div>

          <div class="card">
            <div class="eyebrow">Act</div>
            <div id="act1SummaryValue" class="big">0%</div>
            <div class="bar">
              <span id="act1SummaryBar" style="width:0%"></span>
            </div>
          </div>

          <div class="card">
            <div class="eyebrow">Pace</div>
            <div id="pacePill" class="mid">—</div>
          </div>

        </div>
      </div>

      <!-- SETTINGS -->
      <div class="panel">
        <button id="settingsToggle" class="btn full">⚙ Settings</button>

        <div id="settingsPanel" class="settings">
          <div class="fields">

            <div class="field">
              <label>Difficulty</label>
              <select id="difficultySelect">
                <option value="Lethal">Lethal</option>
                <option value="Easy">Easy</option>
              </select>
            </div>

            <div class="field">
              <label>Act Target (minutes)</label>
              <input id="act1TargetMinutes" type="number" value="180" />
            </div>

          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="stack">

      <!-- OBJECTIVES -->
      <div class="panel">

        <div class="phaseBox">
          <div class="eyebrow">Active Phase</div>
          <div id="activePhaseName" class="mid">—</div>
          <div id="activePhaseNote" class="objectiveText"></div>
        </div>

        <div class="objectiveNote">
          <div class="eyebrow">Current Objective</div>
          <div id="currentObjectiveText" class="objectiveText"></div>
        </div>

        <div class="eyebrow" style="margin-top:10px">Tracked Totals</div>
        <div id="progressGrid" class="progressGrid"></div>

      </div>

      <!-- SPLITS -->
      <div class="panel">

        <div class="row between">
          <div>
            <div class="mid">Split Queue</div>
            <div class="subtitle">Only current split is clickable</div>
          </div>
          <div id="queuePill" class="pill">0 splits</div>
        </div>

        <div class="queueWrap">
          <div id="splitButtons" class="splitList"></div>

          <div class="card">
            <div class="row between">
              <div class="eyebrow">History</div>
              <div id="historySaved" class="subtitle">0</div>
            </div>

            <div id="historyList" class="history"></div>
          </div>
        </div>

      </div>

    </div>

  </div>
</div>

<!-- CONTROLLER LOGIC -->
<script type="module" src="./controller.js"></script>
</body>
</html>
